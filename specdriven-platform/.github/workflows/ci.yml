name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  typecheck-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Prisma generate
        run: npm run db:generate
        env:
          DATABASE_URL: postgresql://specdriven:specdriven@localhost:5432/specdriven?schema=public

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
